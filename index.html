<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Warrior • Intercessor AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000000; font-family: 'Georgia', serif; color: #EAE0C8; }
        .header-gradient { background: linear-gradient(to right, #8B0000, #C45508, #FF4500); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-black border-4 border-[#8B4513] rounded-3xl overflow-hidden">

        <div class="header-gradient py-8 px-6 text-center">
            <img src="BlkHorsePrayWarriorLogo.png" alt="Prayer Warrior" class="mx-auto h-36">
            <p class="text-[#D2B48C] mt-3">Each of us can utilize additional prayer.<br>Please submit your prayer request below.</p>
        </div>

        <div class="p-6">
            <input id="petition-input" type="text" placeholder="Type your prayer request here..." 
                   class="w-full p-5 border-4 border-orange-500 rounded-3xl text-lg">

            <button onclick="generatePrayer()" 
                    class="mt-4 w-full bg-orange-600 hover:bg-orange-500 py-5 text-xl font-bold rounded-3xl">
                SUBMIT PRAYER REQUEST
            </button>

            <div id="prayer-result" class="hidden mt-6">
                <div id="prayer-content" class="bg-zinc-900 p-6 rounded-2xl text-[#EAE0C8]"></div>
                <div class="mt-4 flex gap-3">
                    <button onclick="readPrayer()" class="flex-1 bg-green-700 py-4 rounded-2xl">🔊 READ ALOUD</button>
                    <button onclick="resetApp()" class="flex-1 bg-amber-700 py-4 rounded-2xl">SUBMIT ANOTHER</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PROXY_URL = "https://your-proxy-name.onrender.com/pray";   // ← Change this after deploying

        async function generatePrayer() {
            const petition = document.getElementById("petition-input").value.trim();
            if (!petition) return alert("Please type your request");

            const res = await fetch(PROXY_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ petition })
            });

            const data = await res.json();
            document.getElementById("prayer-content").innerHTML = data.prayer;
            document.getElementById("prayer-result").classList.remove("hidden");
        }

        function readPrayer() {
            const u = new SpeechSynthesisUtterance(document.getElementById("prayer-content").innerText);
            speechSynthesis.speak(u);
        }

        function resetApp() {
            document.getElementById("prayer-result").classList.add("hidden");
            document.getElementById("petition-input").value = "";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Prayer Warrior • Intercessor AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #1a0a05 0%, #000000 100%); 
            font-family: 'Outfit', sans-serif; 
            color: #EAE0C8; 
        }
        .header-gradient { 
            background: linear-gradient(135deg, #8B0000 0%, #C45508 50%, #FF4500 100%); 
        }
        .glass {
            background: rgba(31, 15, 10, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 69, 0, 0.2);
        }
        .fire-btn { 
            background: linear-gradient(to right, #FF4500, #FF5A00); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
        }
        .fire-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 69, 0, 0.5);
            filter: brightness(1.1);
        }
        .action-btn { 
            transition: all 0.2s ease;
        }
        .action-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }
        #petition-input { 
            transition: border-color 0.3s ease;
        }
        #petition-input:focus {
            border-color: #FF5A00;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 90, 0, 0.2);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 bg-black">

    <div class="w-full max-w-xl glass rounded-[2.5rem] overflow-hidden shadow-2xl border-0">

        <!-- Header -->
        <div class="header-gradient py-10 px-8 text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-black/10"></div>
            <img src="PrayerWarriorLogo.png" alt="AI-Prayer Warrior Logo" 
                 class="relative mx-auto h-40 drop-shadow-[0_0_15px_rgba(0,0,0,0.5)]" 
                 onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
            <div id="logo-fallback" class="hidden text-5xl font-black tracking-widest text-white relative" style="text-shadow: 0 0 20px #FF4500;">
                AI-PRAYER WARRIOR
            </div>
            <p class="relative text-[#EAE0C8]/80 text-lg mt-6 font-light leading-relaxed">
                Receive spiritual strength and a powerful, intercessory prayer. 
                Submit your request below to begin.
            </p>
        </div>

        <div class="p-8">
            <div class="relative group">
                <input id="petition-input" type="text" placeholder="What is on your heart today?"
                       class="w-full bg-black/40 border-2 border-[#FF4500]/30 rounded-[2rem] px-8 py-7 text-[#EAE0C8] placeholder-[#D2B48C]/50 text-xl focus:border-[#FF4500] transition-all">
            </div>

            <button onclick="generatePrayer()" 
                    class="mt-8 fire-btn w-full text-white text-xl font-bold py-6 rounded-[2rem] tracking-wider uppercase">
                Submit Prayer Request
            </button>

            <div id="loading" class="hidden mt-10 text-center text-[#FF4500] text-xl animate-pulse">
                🔥 The Intercessor is on the battlefield...
            </div>

            <div id="prayer-result" class="hidden mt-10 space-y-8">
                <div class="bg-white/5 p-8 rounded-[2rem] text-[#EAE0C8] leading-relaxed text-lg border border-white/10" id="prayer-content"></div>
                
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="readPrayer()" class="action-btn bg-[#B73225] py-5 rounded-2xl text-lg font-bold tracking-wide">🔊 READ ALOUD (Reverent Voice)</button>
                    <button onclick="resetApp()" class="action-btn bg-white/10 py-5 rounded-2xl text-lg font-medium border border-white/10">SUBMIT ANOTHER REQUEST</button>
                </div>

                <div class="pt-6 border-t border-white/5">
                    <p class="text-[#D2B48C] font-semibold mb-4 text-sm tracking-widest uppercase opacity-70">Suggested Guidance</p>
                    <div id="bible-verse" class="text-[#FF4500] italic text-xl font-light leading-relaxed border-l-2 border-[#FF4500] pl-6 py-2"></div>
                </div>

                <div class="text-center mt-8 text-[#D2B48C]/60 text-sm font-light">
                    <div class="mt-4 pt-4 border-t border-white/5">
                        <span id="counter" class="font-semibold text-[#FF4500]">1,000</span> Prayers Delivered and Counting
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Visit Counter Logic
        let visitCount = 1000;
        document.getElementById("counter").textContent = (visitCount + Math.floor(Math.random() * 50)).toLocaleString();

        // Point to your local proxy running on port 3000
        const PROXY_URL = "http://localhost:3000/pray";

        async function generatePrayer() {
            const petition = document.getElementById("petition-input").value.trim();
            if (!petition) return alert("Please type your prayer request");

            document.getElementById("loading").classList.remove("hidden");
            document.getElementById("prayer-result").classList.add("hidden");

            try {
                const response = await fetch(PROXY_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ petition: petition })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                document.getElementById("prayer-content").innerHTML = data.prayer.replace(/\n/g, "<br>");
                document.getElementById("bible-verse").innerHTML = data.verse;
                
                document.getElementById("loading").classList.add("hidden");
                document.getElementById("prayer-result").classList.remove("hidden");

            } catch (err) {
                console.error("Error:", err);
                alert("The connection was interrupted. Please try again.");
                document.getElementById("loading").classList.add("hidden");
            }
        }

        function readPrayer() {
            const text = document.getElementById("prayer-content").innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.75;   // Deeper male-style voice
            utterance.rate = 0.85;    // Slower & reverent pace
            utterance.volume = 1.0;
            speechSynthesis.speak(utterance);
        }

        function resetApp() {
            document.getElementById("prayer-result").classList.add("hidden");
            document.getElementById("petition-input").value = "";
            document.getElementById("petition-input").focus();
        }
    </script>
</body>

</html>
